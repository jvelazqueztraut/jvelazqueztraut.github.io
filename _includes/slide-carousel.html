<div id="{{ include.id }}" class="carousel slide slide-carousel" data-ride="carousel">
  <div class="carousel-inner">
    {% for image in include.images %}
      <div class="carousel-item {% if forloop.first %}active{% endif %}">
        <img src="{{ image }}" class="slide-carousel__img d-block mx-auto" alt="{{ include.alt }}">
      </div>
    {% endfor %}
  </div>
  <button class="carousel-control-prev" type="button" data-target="#{{ include.id }}" data-slide="prev" aria-label="Previous slide">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="sr-only">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-target="#{{ include.id }}" data-slide="next" aria-label="Next slide">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="sr-only">Next</span>
  </button>
</div>
